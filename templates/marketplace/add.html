{% extends 'base.html' %}
{% load static %}

{% block title %}My e-Village - List Product/Service{% endblock %}

{% block content %}
<section style="padding: 60px 0; background: linear-gradient(135deg, hsl(var(--primary-hue), 60%, 98%) 0%, hsl(199, 60%, 98%) 100%);">
    <div class="container" style="display: flex; justify-content: center;">
        <div class="card glass" style="width: 100%; max-width: 600px; padding: 40px; border-radius: var(--radius-lg);">
            <div style="margin-bottom: 24px;">
                <span class="badge badge-success" style="margin-bottom: 8px;">Grameen Bazar</span>
                <h2 style="font-size: 28px;">Sell Your Product or Service</h2>
                <p style="color: var(--text-secondary); font-size: 14px;">Advertise your agricultural crops, milk, handicrafts, tailoring, or repair skills.</p>
            </div>
            
            <form action="{% url 'marketplace:add' %}" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="title" class="form-label">Product / Service Name</label>
                    <input type="text" name="title" id="title" class="form-control" placeholder="e.g. Pure Organic Cow Ghee / Tailoring Services" required>
                </div>
                
                <div class="form-group">
                    <label for="category" class="form-label">Category</label>
                    <select name="category" id="category" class="form-control">
                        <option value="PRODUCE">Fresh Vegetables & Crops</option>
                        <option value="DAIRY">Dairy & Poultry</option>
                        <option value="HANDICRAFTS">Handicrafts & Artworks</option>
                        <option value="SERVICES">Local Labor & Services (Tailoring, Repair)</option>
                        <option value="OTHERS">Others</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price" class="form-label">Price (in ₹)</label>
                    <input type="number" step="0.01" name="price" id="price" class="form-control" placeholder="e.g. 150.00" required>
                </div>

                <div class="form-group">
                    <label for="contact_number" class="form-label">Contact Phone Number (For buyers to call you)</label>
                    <input type="text" name="contact_number" id="contact_number" class="form-control" placeholder="e.g. 9876543210" value="{{ user.phone_number|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">Product / Service Details</label>
                    <textarea name="description" id="description" class="form-control" placeholder="Describe quality, availability, delivery, or custom designs..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="image" class="form-label">Product Image (Recommended)</label>
                    <input type="file" name="image" id="image" class="form-control" accept="image/*" style="padding: 8px 12px;">
                </div>
                
                <div style="display: flex; gap: 16px; margin-top: 24px;">
                    <button type="submit" class="btn btn-primary" style="flex-grow: 1;">List Item For Sale</button>
                    <a href="{% url 'marketplace:list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}

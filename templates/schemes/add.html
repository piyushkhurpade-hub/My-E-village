{% extends 'base.html' %}
{% load static %}

{% block title %}My e-Village - Add Scheme{% endblock %}

{% block content %}
<section style="padding: 60px 0; background: linear-gradient(135deg, hsl(var(--primary-hue), 60%, 98%) 0%, hsl(199, 60%, 98%) 100%);">
    <div class="container" style="display: flex; justify-content: center;">
        <div class="card glass" style="width: 100%; max-width: 600px; padding: 40px; border-radius: var(--radius-lg);">
            <div style="margin-bottom: 24px;">
                <span class="badge badge-progress" style="margin-bottom: 8px;">Panchayat Controls</span>
                <h2 style="font-size: 28px;">Publish Government Scheme</h2>
                <p style="color: var(--text-secondary); font-size: 14px;">Publish an state or central welfare scheme for villagers.</p>
            </div>
            
            <form action="{% url 'schemes:add' %}" method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="title" class="form-label">Scheme Title</label>
                    <input type="text" name="title" id="title" class="form-control" placeholder="e.g. PM Kisan Samman Nidhi / Scholarship" required>
                </div>
                
                <div class="form-group">
                    <label for="category" class="form-label">Category</label>
                    <select name="category" id="category" class="form-control">
                        <option value="FARMERS">Agriculture / Farmers</option>
                        <option value="EDUCATION">Scholarships & Education</option>
                        <option value="PENSIONS">Social Security & Pensions</option>
                        <option value="WOMEN">Women Empowerment</option>
                        <option value="HEALTH">Healthcare & Subsidies</option>
                        <option value="EMPLOYMENT">Employment & Skill Development</option>
                        <option value="OTHERS">Others</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">Scheme Description</label>
                    <textarea name="description" id="description" class="form-control" placeholder="Explain what the scheme is about..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="eligibility" class="form-label">Eligibility Criteria</label>
                    <textarea name="eligibility" id="eligibility" class="form-control" placeholder="e.g. Small & marginal farmers owning up to 2 hectares of cultivable land..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="required_documents" class="form-label">Required Documents List</label>
                    <textarea name="required_documents" id="required_documents" class="form-control" placeholder="e.g. 1. Land holding records (7/12 extract)&#10;2. Aadhaar Card..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="apply_link" class="form-label">Application Link (Optional)</label>
                    <input type="url" name="apply_link" id="apply_link" class="form-control" placeholder="https://external-portal.gov.in/">
                </div>

                <div class="form-group">
                    <label for="last_date" class="form-label">Application Last Date (Optional)</label>
                    <input type="date" name="last_date" id="last_date" class="form-control">
                </div>
                
                <div style="display: flex; gap: 16px; margin-top: 24px;">
                    <button type="submit" class="btn btn-primary" style="flex-grow: 1;">Publish Scheme</button>
                    <a href="{% url 'schemes:list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
